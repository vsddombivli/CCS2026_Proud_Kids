<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chaturmasik Chovihar Scheme 2026 — VS Dham</title>
<style>
  :root{
    --purple: #6b1fa2;
    --purple-dark: #4a0e63;
    --gold: #ffd23f;
    --gold-deep: #f5a623;
    --pink: #e0457a;
    --leaf: #2e7d32;
    --wood: #8a5a2b;
    --wood-dark: #6b3f1d;
    --sky: #4fb3e8;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    width:100%; height:100%;
    overflow:hidden;
    font-family:'Poppins','Segoe UI',Arial,sans-serif;
    background:#1b1230;
    -webkit-user-select:none; user-select:none;
  }
  #app{
    position:relative;
    width:100%; height:100%;
    max-width:560px;
    margin:0 auto;
    background:#1b1230;
    overflow:hidden;
  }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    opacity:0; visibility:hidden;
    transition:opacity .35s ease;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .screen.active{ opacity:1; visibility:visible; }

  /* ============ SCREEN 1: LANDING ============ */
  #screen-landing{
    background: linear-gradient(180deg,#3a8fd1 0%, #4fb3e8 18%, #6fc977 55%, #3f9a4a 100%);
    align-items:center;
    justify-content:flex-start;
    padding:18px 18px 28px;
    gap:14px;
  }
  .landing-frame-wrap{
    position:relative;
    width:100%;
    max-width: 62vh;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
  }
  .landing-frame-wrap img{
    width:100%; height:100%; object-fit:contain; display:block;
  }
  .cta-btn{
    width:100%;
    max-width:420px;
    border:none;
    border-radius:50px;
    padding:18px 24px;
    font-size:20px;
    font-weight:800;
    font-family:inherit;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-shadow:0 8px 18px rgba(0,0,0,0.3);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta-btn:active{ transform:scale(0.97); }
  .cta-primary{
    background: linear-gradient(160deg,#ffd23f,#f5a623);
    color:#5b2d00;
  }
  .landing-title{
    color:#fff;
    text-align:center;
    font-weight:800;
    font-size:17px;
    text-shadow:0 2px 6px rgba(0,0,0,0.3);
    line-height:1.4;
    margin-top:2px;
  }

  /* ============ SCREEN 2: EDITOR ============ */
  #screen-editor{
    background:#0e0a1c;
    align-items:center;
    padding:14px 14px 18px;
    gap:12px;
  }
  .editor-header{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#fff;
    padding:2px 4px;
  }
  .back-btn{
    background:rgba(255,255,255,0.12);
    border:none;
    color:#fff;
    width:38px;height:38px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .editor-title{
    font-weight:700;
    font-size:16px;
    color:#ffe27a;
  }
  .editor-hint{
    color:#cbb8e8;
    font-size:13px;
    text-align:center;
    max-width:380px;
  }

  .stage-wrap{
    position:relative;
    width:100%;
    max-width:420px;
    aspect-ratio: 941/1672;
    flex-shrink:0;
    border-radius:16px;
    overflow:hidden;
    background:#000;
    touch-action:none;
    box-shadow:0 10px 26px rgba(0,0,0,0.5);
  }
  #photoCanvasArea{
    position:absolute; inset:0;
    overflow:hidden;
  }
  #userPhoto{
    position:absolute;
    left:0; top:0;
    transform-origin: 0 0;
    will-change:transform;
    pointer-events:none;
    -webkit-user-drag:none;
  }
  #overlayImg{
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:5;
  }
  .oval-guide{
    position:absolute;
    border:3px dashed rgba(255,255,255,0.85);
    border-radius:50%;
    pointer-events:none;
    z-index:6;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.38);
  }
  .placeholder-msg{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff;
    gap:10px;
    text-align:center;
    padding:0 30px;
    z-index:2;
  }

  .zoom-row{
    width:100%;
    max-width:420px;
    display:flex;
    align-items:center;
    gap:12px;
    color:#fff;
    padding:4px 6px;
  }
  .zoom-row input[type="range"]{
    flex:1;
    height:6px;
    -webkit-appearance:none;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    outline:none;
  }
  .zoom-row input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:26px; height:26px;
    border-radius:50%;
    background: linear-gradient(160deg,#ffd23f,#f5a623);
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
  }
  .zoom-icon{ font-size:18px; opacity:0.8; }

  .name-field-wrap{
    width:100%;
    max-width:420px;
  }
  .name-label{
    color:#ffe27a;
    font-size:13px;
    font-weight:700;
    margin-bottom:6px;
    display:block;
    letter-spacing:0.3px;
  }
  #kidName{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:2px solid #8a5a2b;
    background:#fff8e8;
    font-size:17px;
    font-weight:700;
    color:#4a2d0e;
    font-family:inherit;
    outline:none;
  }
  #kidName:focus{
    border-color:#ffd23f;
    box-shadow:0 0 0 3px rgba(255,210,63,0.35);
  }

  .editor-actions{
    width:100%;
    max-width:420px;
    display:flex;
    gap:10px;
  }
  .secondary-btn{
    flex:0 0 auto;
    background:rgba(255,255,255,0.1);
    color:#fff;
    border:1.5px solid rgba(255,255,255,0.3);
    border-radius:50px;
    padding:14px 18px;
    font-size:15px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .generate-btn{
    flex:1;
    background: linear-gradient(160deg,#34c759,#1f9e46);
    color:#fff;
    border:none;
    border-radius:50px;
    padding:14px 18px;
    font-size:17px;
    font-weight:800;
    font-family:inherit;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(0,0,0,0.3);
  }
  .generate-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
  }

  /* ============ SCREEN 3: RESULT ============ */
  #screen-result{
    background: radial-gradient(ellipse at 50% 0%, #7a1a8f 0%, #3c0858 60%, #1b0530 100%);
    align-items:center;
    padding:20px 16px 30px;
    gap:16px;
    justify-content:flex-start;
  }
  .result-title{
    color:#ffe27a;
    font-size:22px;
    font-weight:900;
    text-align:center;
    text-shadow:0 3px 8px rgba(0,0,0,0.4);
  }
  .result-frame-wrap{
    position:relative;
    width:100%;
    max-width:420px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 14px 34px rgba(0,0,0,0.45);
  }
  .result-frame-wrap canvas, .result-frame-wrap img{
    width:100%;
    display:block;
  }
  .result-actions{
    width:100%;
    max-width:420px;
    display:flex;
    gap:10px;
  }
  .result-actions button, .result-actions a{
    flex:1;
    border:none;
    border-radius:50px;
    padding:15px 14px;
    font-size:15px;
    font-weight:800;
    font-family:inherit;
    cursor:pointer;
    text-align:center;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 8px 16px rgba(0,0,0,0.3);
  }
  .download-btn{ background:linear-gradient(160deg,#ffd23f,#f5a623); color:#5b2d00; }
  .share-btn{ background:linear-gradient(160deg,#25D366,#1aa64c); color:#fff; }
  .redo-link{
    color:#cbb8e8;
    font-size:14px;
    text-decoration:underline;
    margin-top:4px;
    background:none; border:none; cursor:pointer; font-family:inherit;
  }

  #confettiCanvas{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:999;
  }

  .spinner{
    width:46px;height:46px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.25);
    border-top-color:#ffd23f;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-wrap{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    color:#fff; font-weight:600; font-size:14px;
  }

  input[type="file"]{ display:none; }

  @media (max-height: 700px){
    .stage-wrap{ max-width:340px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============ SCREEN 1: LANDING ============ -->
  <div class="screen active" id="screen-landing">
    <div class="landing-frame-wrap">
      <img src="template-full.png" alt="Chaturmasik Chovihar Scheme 2026">
    </div>
    <div class="landing-title">Add your photo in the frame and join the celebration! 🌻</div>
    <button class="cta-btn cta-primary" id="btnAddPhoto">📸 Add Your Photo</button>
  </div>

  <!-- ============ SCREEN 2: EDITOR ============ -->
  <div class="screen" id="screen-editor">
    <div class="editor-header">
      <button class="back-btn" id="btnBackToLanding">‹</button>
      <div class="editor-title">Fit Your Face</div>
      <div style="width:38px;"></div>
    </div>
    <div class="editor-hint">Drag to move &amp; pinch to zoom your photo inside the oval</div>

    <div class="stage-wrap" id="stageWrap">
      <div id="photoCanvasArea">
        <img id="userPhoto" src="" alt="">
      </div>
      <div class="placeholder-msg" id="placeholderMsg">
        <div class="spinner"></div>
        <div>Loading photo…</div>
      </div>
      <img id="overlayImg" src="template-overlay.png" alt="">
      <div class="oval-guide" id="ovalGuide"></div>
    </div>

    <div class="zoom-row">
      <span class="zoom-icon">🔍</span>
      <input type="range" id="zoomSlider" min="100" max="400" value="100">
      <span class="zoom-icon">🔍+</span>
    </div>

    <div class="name-field-wrap">
      <label class="name-label" for="kidName">CHILD'S NAME (shown on the wooden sign)</label>
      <input type="text" id="kidName" maxlength="22" placeholder="e.g. Aarav Shah">
    </div>

    <div class="editor-actions">
      <button class="secondary-btn" id="btnChangePhoto">Change Photo</button>
      <button class="generate-btn" id="btnGenerate">✨ Generate My Card</button>
    </div>
  </div>

  <!-- ============ SCREEN 3: RESULT ============ -->
  <div class="screen" id="screen-result">
    <div class="result-title">🎉 You're All Set! 🎉</div>
    <div class="result-frame-wrap">
      <canvas id="finalCanvas"></canvas>
    </div>
    <div class="result-actions">
      <a class="download-btn" id="btnDownload" download="chaturmasik-chovihar-2026.png">⬇ Download</a>
      <button class="share-btn" id="btnShare">📤 Share</button>
    </div>
    <button class="redo-link" id="btnRedo">↺ Try a different photo</button>
  </div>

</div>

<canvas id="confettiCanvas"></canvas>

<input type="file" id="fileInput" accept="image/*">

<script src="app.js"></script>
</body>
</html>
